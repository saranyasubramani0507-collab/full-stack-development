<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Node + Express + HTML</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .box{
    background:white;
    padding:20px;
    width:400px;
    border-radius:10px;
  }

  input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
  }

  button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }

  .user{
    background:#e2e8f0;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
  }
</style>
</head>

<body>

<h2>Express Backend + HTML Frontend</h2>

<div class="box">

  <input type="text" id="name" placeholder="Enter name">

  <button onclick="addUser()">Add User</button>

  <hr>

  <button onclick="loadUsers()">Load Users</button>

  <div id="users"></div>

</div>

<script>

  // GET API
  async function loadUsers(){
    const res = await fetch("/api/users");
    const data = await res.json();

    document.getElementById("users").innerHTML =
      data.map(u => `<div class="user">${u.name}</div>`).join("");
  }

  // POST API
  async function addUser(){
    const name = document.getElementById("name").value;

    await fetch("/api/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name })
    });

    document.getElementById("name").value = "";
    loadUsers();
  }

</script>

</body>
</html>
