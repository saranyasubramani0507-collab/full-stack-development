<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Integration Frontend</title>

<style>
  body{
    font-family:Arial, sans-serif;
    background:#f1f5f9;
    padding:30px;
  }

  h1{
    text-align:center;
    margin-bottom:20px;
  }

  .container{
    max-width:900px;
    margin:auto;
  }

  .card{
    background:white;
    padding:15px;
    margin-bottom:10px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
  }

  button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2563eb;
    color:white;
    margin-bottom:15px;
  }

  button:hover{
    background:#1d4ed8;
  }

  input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:1px solid #cbd5e1;
    border-radius:8px;
  }

  .form{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
  }
</style>
</head>

<body>

<h1>🌐 API Integration Demo</h1>

<div class="container">

  <!-- POST FORM -->
  <div class="form">
    <h3>Add User (POST API)</h3>

    <input type="text" id="name" placeholder="Enter name">
    <input type="email" id="email" placeholder="Enter email">

    <button onclick="addUser()">Submit</button>
  </div>

  <!-- GET DATA -->
  <button onclick="fetchUsers()">Load Users (GET API)</button>

  <div id="users"></div>

</div>

<script>

  // -------------------------
  // GET API (Fetch Users)
  // -------------------------
  async function fetchUsers(){

    const res = await fetch("https://jsonplaceholder.typicode.com/users");
    const data = await res.json();

    document.getElementById("users").innerHTML = data.map(user => `
      <div class="card">
        <h3>${user.name}</h3>
        <p>${user.email}</p>
      </div>
    `).join("");
  }

  // -------------------------
  // POST API (Add User)
  // -------------------------
  async function addUser(){

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    const response = await fetch("https://jsonplaceholder.typicode.com/users", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name,
        email
      })
    });

    const result = await response.json();

    alert("User Added Successfully!\nID: " + result.id);

    // refresh list (optional)
    fetchUsers();
  }

</script>

</body>
</html>
