<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Verification System</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .box{
    background:white;
    padding:20px;
    width:400px;
    border-radius:10px;
  }

  input{
    width:100%;
    padding:10px;
    margin:10px 0;
  }

  button{
    width:100%;
    padding:10px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }

  .result{
    margin-top:15px;
    background:#e2e8f0;
    padding:10px;
    border-radius:8px;
  }
</style>
</head>

<body>

<h2>Email Verification Demo</h2>

<div class="box">

  <input
    type="email"
    id="email"
    placeholder="Enter Email"
  >

  <button onclick="register()">
    Send Verification Email
  </button>

  <div class="result" id="output"></div>

</div>

<script>

async function register(){

  const email =
    document.getElementById("email").value;

  const res = await fetch(
    "http://localhost:5000/register",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    }
  );

  const data = await res.json();

  document.getElementById("output").innerHTML =
    data.message;
}

</script>

</body>
</html>
