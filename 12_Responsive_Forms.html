<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .form-container{
      width:100%;
      max-width:700px;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .form-container h2{
      margin-bottom:25px;
      text-align:center;
      color:#111827;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
    }

    .full-width{
      grid-column:1 / -1;
    }

    .form-group{
      display:flex;
      flex-direction:column;
    }

    .form-group label{
      margin-bottom:8px;
      font-weight:bold;
      color:#374151;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      outline:none;
      font-size:15px;
      transition:0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus{
      border-color:#2563eb;
    }

    textarea{
      resize:none;
      min-height:120px;
    }

    .btn{
      padding:14px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#1d4ed8;
    }

    @media(max-width:768px){
      form{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="form-container">

    <h2>Responsive Registration Form</h2>

    <form>

      <!-- First Name -->
      <div class="form-group">
        <label>First Name</label>
        <input type="text" placeholder="Enter first name">
      </div>

      <!-- Last Name -->
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" placeholder="Enter last name">
      </div>

      <!-- Email -->
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" placeholder="Enter email">
      </div>

      <!-- Phone -->
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number">
      </div>

      <!-- Country -->
      <div class="form-group">
        <label>Country</label>

        <select>
          <option>Select Country</option>
          <option>India</option>
          <option>USA</option>
          <option>UK</option>
        </select>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <input type="password" placeholder="Enter password">
      </div>

      <!-- Address -->
      <div class="form-group full-width">
        <label>Address</label>
        <textarea placeholder="Enter address"></textarea>
      </div>

      <!-- Submit -->
      <div class="form-group full-width">
        <button type="submit" class="btn">
          Submit Form
        </button>
      </div>

    </form>

  </div>

</body>
</html>
