!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Postman API Testing Tool</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:38px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.api-box{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.row{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

select,input{
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
}

select{
    width:150px;
    font-weight:bold;
}

input{
    flex:1;
}

textarea{
    width:100%;
    height:180px;
    padding:15px;
    border:none;
    border-radius:12px;
    resize:none;
    outline:none;
}

.send-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-top:15px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

.send-btn:hover{
    transform:translateY(-2px);
}

.response-box{
    margin-top:25px;
    background:#0f172a;
    border-radius:15px;
    padding:20px;
}

.response-title{
    margin-bottom:15px;
    color:#38bdf8;
}

pre{
    color:#22c55e;
    white-space:pre-wrap;
    word-wrap:break-word;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:25px;
}

.card{
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    padding:20px;
    text-align:center;
}

.card h3{
    color:#38bdf8;
}

.card p{
    margin-top:10px;
    font-size:22px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>📮 Postman API Testing</h1>
        <p>Test REST APIs Like Postman</p>
    </div>

    <div class="api-box">

        <div class="row">

            <select id="method">
                <option>GET</option>
                <option>POST</option>
                <option>PUT</option>
                <option>DELETE</option>
            </select>

            <input
                type="text"
                id="endpoint"
                placeholder="https://api.example.com/users">

        </div>

        <textarea
        id="requestBody"
        placeholder='{
  "name":"Nila",
  "email":"nila@example.com"
}'></textarea>

        <button class="send-btn" onclick="sendRequest()">
            🚀 Send Request
        </button>

        <div class="response-box">

            <h3 class="response-title">
                API Response
            </h3>

            <pre id="response">
Waiting for request...
            </pre>

        </div>

        <div class="stats">

            <div class="card">
                <h3>Status</h3>
                <p id="status">---</p>
            </div>

            <div class="card">
                <h3>Response Time</h3>
                <p id="time">---</p>
            </div>

            <div class="card">
                <h3>Requests Sent</h3>
                <p id="count">0</p>
            </div>

        </div>

    </div>

</div>

<script>

let totalRequests=0;

function sendRequest(){

    const method=
    document.getElementById("method").value;

    const endpoint=
    document.getElementById("endpoint").value;

    if(endpoint===""){
        alert("Enter API Endpoint");
        return;
    }

    totalRequests++;

    document.getElementById("count")
    .innerHTML=totalRequests;

    const responseTime=
    Math.floor(Math.random()*300)+50;

    document.getElementById("status")
    .innerHTML="200 OK";

    document.getElementById("time")
    .innerHTML=responseTime+" ms";

    document.getElementById("response")
    .textContent=
`{
  "success": true,
  "method": "${method}",
  "endpoint": "${endpoint}",
  "message": "API Tested Successfully",
  "timestamp": "${new Date().toLocaleString()}"
}`;
}

</script>

</body>
</html>
