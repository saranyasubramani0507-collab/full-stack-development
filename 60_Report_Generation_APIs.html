<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Generation System</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
  }

  h2{
    text-align:center;
    margin-bottom:20px;
  }

  button{
    padding:10px 15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:20px;
  }

  table{
    width:100%;
    border-collapse:collapse;
  }

  table th,
  table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
  }

  table th{
    background:#2563eb;
    color:white;
  }

  .summary{
    margin-bottom:20px;
    background:#e2e8f0;
    padding:15px;
    border-radius:8px;
  }
</style>
</head>

<body>

<div class="container">

  <h2>Report Generation Dashboard</h2>

  <button onclick="loadReports()">
    Load Reports
  </button>

  <div class="summary" id="summary">
    Report Summary Loading...
  </div>

  <table>

    <thead>
      <tr>
        <th>ID</th>
        <th>Customer</th>
        <th>Sales</th>
        <th>Orders</th>
        <th>Date</th>
      </tr>
    </thead>

    <tbody id="reportTable"></tbody>

  </table>

</div>

<script>

// LOAD REPORTS
async function loadReports(){

  // Fetch reports
  const reportRes =
    await fetch("http://localhost:5000/reports");

  const reportData =
    await reportRes.json();

  // Fetch summary
  const summaryRes =
    await fetch(
      "http://localhost:5000/reports-summary"
    );

  const summary =
    await summaryRes.json();

  // Render summary
  document.getElementById("summary")
    .innerHTML = `
      <strong>Total Reports:</strong>
      ${summary.totalReports}
      <br>

      <strong>Total Sales:</strong>
      ₹${summary.totalSales}
      <br>

      <strong>Total Orders:</strong>
      ${summary.totalOrders}
    `;

  // Render reports
  document.getElementById("reportTable")
    .innerHTML =
      reportData.data.map(report => `
        <tr>
          <td>${report.id}</td>
          <td>${report.customer}</td>
          <td>₹${report.sales}</td>
          <td>${report.orders}</td>
          <td>${report.date}</td>
        </tr>
      `).join("");
}

// Auto load
loadReports();

</script>

</body>
</html>
