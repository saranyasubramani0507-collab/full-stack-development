<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Password Hashing Demo</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f3f4f6;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .container{
        background:#fff;
        padding:25px;
        width:350px;
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:10px;
        margin:8px 0;
        border:1px solid #ccc;
        border-radius:6px;
    }

    button{
        width:100%;
        padding:10px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#1d4ed8;
    }

    .output{
        margin-top:15px;
        background:#f9fafb;
        padding:10px;
        border-radius:6px;
        word-break:break-all;
        font-size:14px;
    }
</style>
</head>
<body>

<div class="container">

    <h2>Password Hashing</h2>

    <input type="text" id="username" placeholder="Enter Username">

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="hashPassword()">Generate Secure Hash</button>

    <div class="output" id="result"></div>

</div>

<script>
// Simple SHA-256 hashing using Web Crypto API

async function hashPassword(){

    const username =
        document.getElementById("username").value;

    const password =
        document.getElementById("password").value;

    if(!username || !password){
        alert("Please fill all fields");
        return;
    }

    // Convert password to UTF-8
    const encoder = new TextEncoder();
    const data = encoder.encode(password);

    // Generate SHA-256 hash
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);

    // Convert buffer to hex string
    const hashArray = Array.from(new Uint8Array(hashBuffer));

    const hashHex = hashArray
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");

    document.getElementById("result").innerHTML = `
        <strong>Username:</strong> ${username}<br><br>
        <strong>SHA-256 Hash:</strong><br>
        ${hashHex}
    `;
}
</script>

</body>
</html>
