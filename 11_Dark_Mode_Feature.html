<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
      transition:background 0.3s,color 0.3s;
    }

    body{
      background:#f1f5f9;
      color:#111827;
      padding:30px;
    }

    /* Dark Mode */
    body.dark{
      background:#0f172a;
      color:#f8fafc;
    }

    .container{
      max-width:900px;
      margin:auto;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    /* Toggle Button */
    .toggle-btn{
      padding:10px 18px;
      border:none;
      border-radius:8px;
      background:#2563eb;
      color:white;
      cursor:pointer;
      font-size:15px;
    }

    .toggle-btn:hover{
      background:#1d4ed8;
    }

    /* Cards */
    .card-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    body.dark .card{
      background:#1e293b;
      box-shadow:none;
    }

    .card h3{
      margin-bottom:10px;
    }

    .card p{
      color:#475569;
    }

    body.dark .card p{
      color:#cbd5e1;
    }

    /* Table */
    .table-section{
      margin-top:30px;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    body.dark .table-section{
      background:#1e293b;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    table th,
    table td{
      padding:12px;
      border-bottom:1px solid #e2e8f0;
      text-align:left;
    }

    body.dark table th,
    body.dark table td{
      border-color:#334155;
    }

    @media(max-width:768px){
      .header{
        flex-direction:column;
        gap:15px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>Dashboard</h1>

      <button class="toggle-btn" onclick="toggleDarkMode()">
        Toggle Dark Mode
      </button>
    </div>

    <!-- Cards -->
    <div class="card-grid">

      <div class="card">
        <h3>Total Users</h3>
        <p>1,250 Users</p>
      </div>

      <div class="card">
        <h3>Revenue</h3>
        <p>₹95,000</p>
      </div>

      <div class="card">
        <h3>Orders</h3>
        <p>530 Orders</p>
      </div>

    </div>

    <!-- Table -->
    <div class="table-section">
      <h2>Recent Activity</h2>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>User</th>
            <th>Status</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>1</td>
            <td>John</td>
            <td>Active</td>
          </tr>

          <tr>
            <td>2</td>
            <td>Priya</td>
            <td>Pending</td>
          </tr>

          <tr>
            <td>3</td>
            <td>Rahul</td>
            <td>Blocked</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script>
    function toggleDarkMode(){
      document.body.classList.toggle("dark");

      // Save theme in localStorage
      if(document.body.classList.contains("dark")){
        localStorage.setItem("theme","dark");
      } else {
        localStorage.setItem("theme","light");
      }
    }

    // Load saved theme
    window.onload = function(){
      const savedTheme = localStorage.getItem("theme");

      if(savedTheme === "dark"){
        document.body.classList.add("dark");
      }
    }
  </script>

</body>
</html>
