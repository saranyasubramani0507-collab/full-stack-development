<!DOCTYPE html>
<html>
<head>
  <title>Django HTML System</title>

  <style>
    body{
      font-family:Arial;
      background:#f1f5f9;
      padding:30px;
    }

    .box{
      background:white;
      padding:20px;
      border-radius:10px;
      width:400px;
    }

    input{
      width:100%;
      padding:10px;
      margin-bottom:10px;
    }

    button{
      width:100%;
      padding:10px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    .user{
      background:#e2e8f0;
      padding:8px;
      margin-top:5px;
      border-radius:6px;
      display:flex;
      justify-content:space-between;
    }

    a{
      color:red;
      text-decoration:none;
    }
  </style>
</head>

<body>

<h2>Django Backend + HTML System</h2>

<div class="box">

  <form method="POST" action="/add/">
    {% csrf_token %}
    <input type="text" name="name" placeholder="Enter name">
    <input type="email" name="email" placeholder="Enter email">
    <button type="submit">Add User</button>
  </form>

  <hr>

  <h3>User List</h3>

  {% for user in users %}
    <div class="user">
      <span>{{ user.name }}</span>
      <a href="/delete/{{ user.id }}/">Delete</a>
    </div>
  {% endfor %}

</div>

</body>
</html>
