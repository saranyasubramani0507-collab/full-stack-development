<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Mobile Layout</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
  }

  body{
    background:#f1f5f9;
  }

  /* Navbar */
  .navbar{
    background:#111827;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
  }

  .menu{
    display:flex;
    gap:20px;
  }

  .menu a{
    color:white;
    text-decoration:none;
  }

  /* Hero */
  .hero{
    padding:40px 20px;
    text-align:center;
    background:linear-gradient(to right,#2563eb,#1e40af);
    color:white;
  }

  .hero h1{
    font-size:40px;
  }

  .hero p{
    margin-top:10px;
  }

  /* Layout Grid */
  .container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
    max-width:1200px;
    margin:auto;
  }

  .card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }

  /* Sidebar */
  .sidebar{
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  /* Cards Grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
    margin-top:20px;
  }

  /* Footer */
  .footer{
    background:#111827;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
  }

  /* 📱 Mobile Responsive */
  @media(max-width:768px){

    .menu{
      display:none; /* hide menu on mobile */
    }

    .hero h1{
      font-size:28px;
    }

    .container{
      grid-template-columns:1fr; /* stack layout */
    }

    .sidebar{
      order:-1;
    }
  }

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>MyApp</h2>

  <div class="menu">
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <h1>Responsive Mobile Layout</h1>
  <p>Works perfectly on all devices</p>
</div>

<!-- Main Layout -->
<div class="container">

  <!-- Content -->
  <div class="card">
    <h2>Main Content</h2>

    <div class="grid">

      <div class="card">
        <h3>Card 1</h3>
        <p>Responsive box layout</p>
      </div>

      <div class="card">
        <h3>Card 2</h3>
        <p>Flexible grid system</p>
      </div>

      <div class="card">
        <h3>Card 3</h3>
        <p>Mobile friendly UI</p>
      </div>

    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="card">
      <h3>Sidebar 1</h3>
      <p>Navigation widget</p>
    </div>

    <div class="card">
      <h3>Sidebar 2</h3>
      <p>Ads / Info box</p>
    </div>

  </div>

</div>

<!-- Footer -->
<div class="footer">
  © 2026 Responsive UI Design
</div>
</body>
</html>
