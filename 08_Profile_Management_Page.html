<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Management</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .profile-container{
      background:white;
      width:100%;
      max-width:800px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      overflow:hidden;
    }

    /* Header */
    .profile-header{
      background:#2563eb;
      color:white;
      text-align:center;
      padding:30px 20px;
    }

    .profile-header img{
      width:120px;
      height:120px;
      border-radius:50%;
      border:4px solid white;
      object-fit:cover;
      margin-bottom:15px;
    }

    .profile-header h2{
      margin-bottom:5px;
    }

    .profile-header p{
      opacity:0.9;
    }

    /* Form */
    .profile-form{
      padding:30px;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#334155;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus{
      border-color:#2563eb;
    }

    textarea{
      resize:none;
      height:100px;
    }

    /* Buttons */
    .button-group{
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .btn{
      flex:1;
      padding:12px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    .save-btn{
      background:#2563eb;
      color:white;
    }

    .save-btn:hover{
      background:#1d4ed8;
    }

    .cancel-btn{
      background:#e2e8f0;
      color:#111827;
    }

    .cancel-btn:hover{
      background:#cbd5e1;
    }

    @media(max-width:600px){
      .button-group{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>

  <div class="profile-container">

    <!-- Profile Header -->
    <div class="profile-header">
      <img src="https://via.placeholder.com/120" alt="Profile Image">

      <h2>John Doe</h2>
      <p>Administrator</p>
    </div>

    <!-- Profile Form -->
    <div class="profile-form">

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" value="John Doe">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" value="john@example.com">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" value="+91 9876543210">
      </div>

      <div class="form-group">
        <label>Role</label>
        <select>
          <option>Administrator</option>
          <option>Manager</option>
          <option>User</option>
        </select>
      </div>

      <div class="form-group">
        <label>Bio</label>
        <textarea>Lorem ipsum dolor sit amet consectetur adipisicing elit.</textarea>
      </div>

      <div class="form-group">
        <label>Change Password</label>
        <input type="password" placeholder="Enter new password">
      </div>

      <!-- Buttons -->
      <div class="button-group">
        <button class="btn save-btn">Save Changes</button>
        <button class="btn cancel-btn">Cancel</button>
      </div>

    </div>
  </div>

</body>
</html>
