<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unit Testing Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    min-height:100vh;
    color:white;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:40px;
}

.header p{
    color:#cbd5e1;
    margin-top:10px;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
    text-align:center;
}

.card h3{
    color:#38bdf8;
}

.card p{
    font-size:32px;
    font-weight:bold;
    margin-top:10px;
}

.test-panel{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(12px);
    padding:25px;
    border-radius:20px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-bottom:20px;
}

button:hover{
    opacity:.9;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:15px;
    text-align:left;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

th{
    color:#38bdf8;
}

.pass{
    color:#22c55e;
    font-weight:bold;
}

.fail{
    color:#ef4444;
    font-weight:bold;
}

.progress{
    width:100%;
    height:25px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
    margin-top:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#22c55e;
    text-align:center;
    line-height:25px;
    font-weight:bold;
    transition:1s;
}

</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🧪 Unit Testing Dashboard</h1>
        <p>Automated Test Execution & Coverage Report</p>
    </div>

    <div class="dashboard">

        <div class="card">
            <h3>Total Tests</h3>
            <p id="total">5</p>
        </div>

        <div class="card">
            <h3>Passed</h3>
            <p id="passed">0</p>
        </div>

        <div class="card">
            <h3>Failed</h3>
            <p id="failed">0</p>
        </div>

        <div class="card">
            <h3>Coverage</h3>
            <p id="coverage">0%</p>
        </div>

    </div>

    <div class="test-panel">

        <button onclick="runTests()">
            ▶ Run Unit Tests
        </button>

        <table>

            <thead>
                <tr>
                    <th>Test Case</th>
                    <th>Module</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="testResults">

                <tr>
                    <td>Login Validation</td>
                    <td>Auth</td>
                    <td>-</td>
                </tr>

                <tr>
                    <td>User Registration</td>
                    <td>Users</td>
                    <td>-</td>
                </tr>

                <tr>
                    <td>API Response Check</td>
                    <td>API</td>
                    <td>-</td>
                </tr>

                <tr>
                    <td>Password Encryption</td>
                    <td>Security</td>
                    <td>-</td>
                </tr>

                <tr>
                    <td>Database Connection</td>
                    <td>Database</td>
                    <td>-</td>
                </tr>

            </tbody>

        </table>

        <div class="progress">
            <div class="progress-bar" id="progressBar">
                0%
            </div>
        </div>

    </div>

</div>

<script>

function runTests(){

    const rows =
    document.querySelectorAll("#testResults tr");

    let passCount = 0;
    let failCount = 0;

    rows.forEach((row)=>{

        const status =
        Math.random()>0.2 ? "PASS" : "FAIL";

        const statusCell =
        row.cells[2];

        if(status==="PASS"){
            passCount++;
            statusCell.innerHTML =
            '<span class="pass">PASS</span>';
        }else{
            failCount++;
            statusCell.innerHTML =
            '<span class="fail">FAIL</span>';
        }

    });

    document.getElementById("passed")
    .innerHTML = passCount;

    document.getElementById("failed")
    .innerHTML = failCount;

    const coverage =
    Math.round((passCount/rows.length)*100);

    document.getElementById("coverage")
    .innerHTML = coverage + "%";

    document.getElementById("progressBar")
    .style.width = coverage + "%";

    document.getElementById("progressBar")
    .innerHTML = coverage + "%";
}

</script>

</body>
</html>
