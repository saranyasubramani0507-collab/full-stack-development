<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings Management UI</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:30px;
      color:#1e293b;
    }

    .settings-container{
      max-width:900px;
      margin:auto;
    }

    .page-title{
      margin-bottom:25px;
      font-size:32px;
      font-weight:bold;
    }

    .settings-card{
      background:#fff;
      border-radius:12px;
      padding:25px;
      margin-bottom:25px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .settings-card h2{
      margin-bottom:20px;
      font-size:22px;
      color:#0f172a;
    }

    .form-group{
      margin-bottom:20px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:600;
    }

    .form-group input,
    .form-group select{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      font-size:15px;
      outline:none;
    }

    .form-group input:focus,
    .form-group select:focus{
      border-color:#2563eb;
    }

    /* Toggle Switch */
    .toggle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 0;
      border-bottom:1px solid #e2e8f0;
    }

    .switch{
      position:relative;
      width:50px;
      height:26px;
    }

    .switch input{
      display:none;
    }

    .slider{
      position:absolute;
      cursor:pointer;
      top:0;
      left:0;
      right:0;
      bottom:0;
      background:#cbd5e1;
      border-radius:30px;
      transition:0.3s;
    }

    .slider:before{
      content:"";
      position:absolute;
      width:20px;
      height:20px;
      left:3px;
      top:3px;
      background:white;
      border-radius:50%;
      transition:0.3s;
    }

    input:checked + .slider{
      background:#2563eb;
    }

    input:checked + .slider:before{
      transform:translateX(24px);
    }

    /* Buttons */
    .button-group{
      display:flex;
      gap:15px;
      margin-top:20px;
    }

    .btn{
      padding:12px 20px;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:15px;
      transition:0.3s;
    }

    .save-btn{
      background:#2563eb;
      color:white;
    }

    .save-btn:hover{
      background:#1d4ed8;
    }

    .reset-btn{
      background:#e2e8f0;
      color:#111827;
    }

    .reset-btn:hover{
      background:#cbd5e1;
    }

    @media(max-width:768px){
      body{
        padding:15px;
      }

      .button-group{
        flex-direction:column;
      }
    }
  </style>
</head>

<body>

  <div class="settings-container">

    <h1 class="page-title">Settings</h1>

    <!-- Account Settings -->
    <div class="settings-card">
      <h2>Account Settings</h2>

      <div class="form-group">
        <label>Username</label>
        <input type="text" value="admin">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" value="admin@example.com">
      </div>

      <div class="form-group">
        <label>Language</label>
        <select>
          <option>English</option>
          <option>Tamil</option>
          <option>Hindi</option>
        </select>
      </div>
    </div>

    <!-- Notification Settings -->
    <div class="settings-card">
      <h2>Notifications</h2>

      <div class="toggle">
        <span>Email Notifications</span>

        <label class="switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle">
        <span>SMS Notifications</span>

        <label class="switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle">
        <span>Push Notifications</span>

        <label class="switch">
          <input type="checkbox" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Security Settings -->
    <div class="settings-card">
      <h2>Security</h2>

      <div class="form-group">
        <label>New Password</label>
        <input type="password" placeholder="Enter new password">
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password">
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-group">
      <button class="btn save-btn">Save Settings</button>
      <button class="btn reset-btn">Reset</button>
    </div>

  </div>

</body>
</html>
