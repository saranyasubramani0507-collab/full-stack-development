<DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title<!>PDF Export Functionality</title>

<!-- jsPDF CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    body{
        font-family:Arial, sans-serif;
        background:#f3f4f6;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .container{
        width:500px;
        background:white;
        padding:25px;
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    h2{
        text-align:center;
        color:#2563eb;
        margin-bottom:20px;
    }

    input, textarea{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:6px;
        font-size:15px;
    }

    textarea{
        height:150px;
        resize:none;
    }

    button{
        width:100%;
        padding:12px;
        background:#2563eb;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-size:16px;
    }

    button:hover{
        background:#1d4ed8;
    }

    .preview{
        margin-top:20px;
        padding:15px;
        background:#f9fafb;
        border-radius:8px;
    }
</style>
</head>
<body>

<div class="container">

    <h2>PDF Export Functionality</h2>

    <input type="text"
           id="title"
           placeholder="Enter document title">

    <textarea id="content"
        placeholder="Write your content here..."></textarea>

    <button onclick="exportPDF()">
        Export PDF
    </button>

    <div class="preview" id="preview">
        <strong>Live Preview</strong>
        <p id="previewTitle"></p>
        <p id="previewContent"></p>
    </div>

</div>

<script>

// Live Preview
document.getElementById("title")
    .addEventListener("input", updatePreview);

document.getElementById("content")
    .addEventListener("input", updatePreview);

function updatePreview(){

    document.getElementById("previewTitle")
        .innerText =
        document.getElementById("title").value;

    document.getElementById("previewContent")
        .innerText =
        document.getElementById("content").value;
}

// Export PDF
async function exportPDF(){

    const { jsPDF } = window.jspdf;

    const doc = new jsPDF();

    const title =
        document.getElementById("title").value;

    const content =
        document.getElementById("content").value;

    // Title
    doc.setFontSize(20);
    doc.setTextColor(37, 99, 235);
    doc.text(title || "Untitled Document", 20, 25);

    // Divider line
    doc.setDrawColor(200);
    doc.line(20, 30, 190, 30);

    // Content
    doc.setFontSize(12);
    doc.setTextColor(0, 0, 0);

    const splitContent =
        doc.splitTextToSize(content, 170);

    doc.text(splitContent, 20, 45);

    // Footer
    doc.setFontSize(10);
    doc.setTextColor(120);

    doc.text(
        "Generated using PDF Export Functionality",
        20,
        285
    );

    // Save PDF
    doc.save("exported-document.pdf");
}

</script>

</body>
</html>
