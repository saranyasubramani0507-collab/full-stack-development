<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Page</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:30px;
      color:#111827;
    }

    .checkout-container{
      max-width:1200px;
      margin:auto;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:30px;
    }

    /* Forms */
    .checkout-form,
    .order-summary{
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    h2{
      margin-bottom:20px;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-weight:bold;
      color:#374151;
    }

    .form-group input,
    .form-group select,
    .form-group textarea{
      width:100%;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
      outline:none;
      font-size:15px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus{
      border-color:#2563eb;
    }

    textarea{
      resize:none;
      height:100px;
    }

    /* Payment Options */
    .payment-method{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:10px;
    }

    .payment-option{
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px;
      border:1px solid #cbd5e1;
      border-radius:8px;
    }

    /* Order Summary */
    .summary-item{
      display:flex;
      justify-content:space-between;
      margin-bottom:15px;
      padding-bottom:10px;
      border-bottom:1px solid #e2e8f0;
    }

    .summary-total{
      display:flex;
      justify-content:space-between;
      font-size:22px;
      font-weight:bold;
      margin-top:20px;
    }

    /* Button */
    .btn{
      width:100%;
      padding:15px;
      border:none;
      border-radius:8px;
      background:#16a34a;
      color:white;
      font-size:16px;
      cursor:pointer;
      margin-top:25px;
      transition:0.3s;
    }

    .btn:hover{
      background:#15803d;
    }

    @media(max-width:900px){
      .checkout-container{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <div class="checkout-container">

    <!-- Checkout Form -->
    <div class="checkout-form">

      <h2>Billing Details</h2>

      <form>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter full name">
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter email">
        </div>

        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" placeholder="Enter phone number">
        </div>

        <div class="form-group">
          <label>Address</label>
          <textarea placeholder="Enter shipping address"></textarea>
        </div>

        <div class="form-group">
          <label>City</label>
          <input type="text" placeholder="Enter city">
        </div>

        <div class="form-group">
          <label>Country</label>

          <select>
            <option>Select Country</option>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
          </select>
        </div>

        <!-- Payment -->
        <h2>Payment Method</h2>

        <div class="payment-method">

          <label class="payment-option">
            <input type="radio" name="payment" checked>
            Credit / Debit Card
          </label>

          <label class="payment-option">
            <input type="radio" name="payment">
            UPI Payment
          </label>

          <label class="payment-option">
            <input type="radio" name="payment">
            Cash on Delivery
          </label>

        </div>

      </form>
    </div>

    <!-- Order Summary -->
    <div class="order-summary">

      <h2>Order Summary</h2>

      <div class="summary-item">
        <span>Wireless Headphones</span>
        <span>₹2,999</span>
      </div>

      <div class="summary-item">
        <span>Smart Watch</span>
        <span>₹4,499</span>
      </div>

      <div class="summary-item">
        <span>Shipping</span>
        <span>₹100</span>
      </div>

      <div class="summary-total">
        <span>Total</span>
        <span>₹7,598</span>
      </div>

      <button class="btn">
        Place Order
      </button>

    </div>

  </div>

</body>
</html>
