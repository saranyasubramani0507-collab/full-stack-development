<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogging Platform</title>

<style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
  }

  body{
    background:#f1f5f9;
  }

  /* Navbar */
  .navbar{
    background:#111827;
    color:white;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .navbar h2{
    font-size:20px;
  }

  /* Layout */
  .container{
    max-width:1100px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
  }

  /* Blog posts */
  .posts{
    display:flex;
    flex-direction:column;
    gap:15px;
  }

  .post{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }

  .post h3{
    margin-bottom:5px;
  }

  .post p{
    color:#475569;
  }

  /* Sidebar form */
  .form-box{
    background:white;
    padding:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    height:fit-content;
  }

  input, textarea{
    width:100%;
    margin-bottom:10px;
    padding:10px;
    border:1px solid #cbd5e1;
    border-radius:8px;
  }

  button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
  }

  button:hover{
    background:#1d4ed8;
  }

  /* Responsive */
  @media(max-width:768px){
    .container{
      grid-template-columns:1fr;
    }
  }
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h2>My Blog</h2>
  <span>Frontend Demo</span>
</div>

<!-- Layout -->
<div class="container">

  <!-- Posts -->
  <div class="posts" id="posts">

    <div class="post">
      <h3>Welcome to My Blog</h3>
      <p>This is your first sample post in the blogging platform.</p>
    </div>

  </div>

  <!-- Create Post -->
  <div class="form-box">

    <h3>Create New Post</h3>

    <input type="text" id="title" placeholder="Post Title">
    <textarea id="content" rows="5" placeholder="Post Content"></textarea>

    <button onclick="addPost()">Publish</button>

  </div>

</div>

<script>
  function addPost(){

    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;

    if(title === "" || content === ""){
      alert("Please fill all fields");
      return;
    }

    const postContainer = document.getElementById("posts");

    const post = document.createElement("div");
    post.classList.add("post");

    post.innerHTML = `
      <h3>${title}</h3>
      <p>${content}</p>
    `;

    postContainer.prepend(post);

    document.getElementById("title").value = "";
    document.getElementById("content").value = "";
  }
</script>

</body>
</html>
