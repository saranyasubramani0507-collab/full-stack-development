<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRUD Operations</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .box{
    background:white;
    padding:20px;
    width:500px;
    border-radius:10px;
  }

  input{
    width:100%;
    padding:10px;
    margin:5px 0;
  }

  button{
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
  }

  .item{
    background:#e2e8f0;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }

  .btn-small{
    width:auto;
    padding:5px 10px;
    margin-left:5px;
    font-size:12px;
  }
</style>
</head>

<body>

<h2>CRUD Operations Demo</h2>

<div class="box">

  <!-- CREATE -->
  <input type="text" id="title" placeholder="Enter Item Title">

  <button onclick="createItem()">Create Item</button>

  <hr>

  <button onclick="loadItems()">Load Items</button>

  <div id="list"></div>

</div>

<script>

// --------------------
// READ (GET)
// --------------------
async function loadItems(){

  const res = await fetch("/api/items");
  const items = await res.json();

  document.getElementById("list").innerHTML =
    items.map(item => `
      <div class="item">
        <span>${item.title}</span>

        <div>
          <button class="btn-small" onclick="editItem(${item.id})">Edit</button>
          <button class="btn-small" onclick="deleteItem(${item.id})">Delete</button>
        </div>
      </div>
    `).join("");
}

// --------------------
// CREATE (POST)
// --------------------
async function createItem(){

  const title = document.getElementById("title").value;

  await fetch("/api/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title })
  });

  document.getElementById("title").value = "";
  loadItems();
}

// --------------------
// UPDATE (PUT)
// --------------------
async function editItem(id){

  const newTitle = prompt("Enter new title:");

  await fetch(`/api/items/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title: newTitle })
  });

  loadItems();
}

// --------------------
// DELETE (DELETE)
// --------------------
async function deleteItem(id){

  await fetch(`/api/items/${id}`, {
    method: "DELETE"
  });

  loadItems();
}

</script>

</body>
</html>
