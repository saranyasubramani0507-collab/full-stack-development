<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Centralized Error Handling UI</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .box{
    background:white;
    padding:20px;
    width:450px;
    border-radius:10px;
  }

  button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
  }

  .error-panel{
    margin-top:15px;
    padding:10px;
    border-radius:8px;
    background:#fee2e2;
    color:#b91c1c;
    white-space:pre-wrap;
  }

  .success-panel{
    margin-top:15px;
    padding:10px;
    border-radius:8px;
    background:#dcfce7;
    color:#166534;
  }
</style>
</head>

<body>

<h2>Centralized Error Handling (Frontend)</h2>

<div class="box">

  <button onclick="callAPI('/success')">Success API</button>

  <button onclick="callAPI('/error')">Error API</button>

  <button onclick="callAPI('/not-found')">404 API</button>

  <div id="output"></div>

</div>

<script>

// ---------------------------
// CENTRAL API HANDLER
// ---------------------------
async function callAPI(endpoint){

  const output = document.getElementById("output");

  try {

    const res = await fetch("http://localhost:5000" + endpoint);

    const data = await res.json();

    // if backend returns error status
    if(!res.ok){
      throw new Error(data.message || "Unknown Error");
    }

    output.innerHTML = `
      <div class="success-panel">
        ✅ SUCCESS:
        ${JSON.stringify(data, null, 2)}
      </div>
    `;

  } catch (err) {

    // CENTRALIZED ERROR DISPLAY
    handleError(err);
  }
}

// ---------------------------
// GLOBAL ERROR HANDLER
// ---------------------------
function handleError(error){

  const output = document.getElementById("output");

  output.innerHTML = `
    <div class="error-panel">
      ❌ ERROR HANDLED GLOBALLY:
      ${error.message}
    </div>
  `;

  // optional logging
  console.log("Central Error Log:", error);
}

</script>

</body>
</html>
