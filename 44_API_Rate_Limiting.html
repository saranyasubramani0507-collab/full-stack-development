<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API Rate Limiting Demo</title>

<style>
  body{
    font-family:Arial;
    background:#f1f5f9;
    padding:30px;
  }

  .box{
    background:white;
    padding:20px;
    width:450px;
    border-radius:10px;
  }

  button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
  }

  .success{
    background:#dcfce7;
    color:#166534;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
  }

  .error{
    background:#fee2e2;
    color:#b91c1c;
    padding:10px;
    border-radius:8px;
    margin-top:10px;
  }
</style>
</head>

<body>

<h2>API Rate Limiting Demo</h2>

<div class="box">

  <button onclick="callAPI()">Call API</button>
  <button onclick="spamAPI()">Spam API (Trigger Limit)</button>

  <div id="output"></div>

</div>

<script>

// SINGLE API CALL
async function callAPI(){

  const res = await fetch("http://localhost:5000/api/data");
  const data = await res.json();

  show(data, res.ok);
}

// SPAM API (to trigger rate limit)
async function spamAPI(){

  for(let i=0; i<10; i++){
    setTimeout(callAPI, i * 200);
  }
}

// UI HANDLER
function show(data, success){

  const output = document.getElementById("output");

  output.innerHTML += `
    <div class="${success ? 'success' : 'error'}">
      ${JSON.stringify(data)}
    </div>
  `;
}

</script>

</body>
</html>
